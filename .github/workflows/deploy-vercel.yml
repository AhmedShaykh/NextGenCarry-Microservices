name: Deploy NEXTGENCARRY Microservices to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy-microservices:
    name: Deploy Microservices to Vercel
    runs-on: ubuntu-latest

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ===========================
      # Deploy Categories API
      # ===========================
      - name: Deploy Categories API
        env:
          DATABASE_URL_CAT: ${{ secrets.DATABASE_URL_CAT }}
          VERCEL_ORG_ID: ${{ secrets.ORG_ID_CAT }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID_CAT }}
        run: |
          cd apps/cat-api
          vercel pull --yes --environment=production
          vercel deploy --prod

      # ===========================
      # Deploy Brands API
      # ===========================
      - name: Deploy Brands API
        env:
          DATABASE_URL_BRAND: ${{ secrets.DATABASE_URL_BRAND }}
          VERCEL_ORG_ID: ${{ secrets.ORG_ID_BRAND }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID_BRAND }}
        run: |
          cd apps/brand-api
          vercel pull --yes --environment=production
          vercel deploy --prod
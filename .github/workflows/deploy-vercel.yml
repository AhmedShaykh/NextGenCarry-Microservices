name: Deploy NextGenCarry Microservices to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy-microservices:
    name: Deploy All Microservices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Brands API 1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          DATABASE_URL_API_1: ${{ secrets.DATABASE_URL_API_1 }}
          VERCEL_ORG_ID: ${{ secrets.ORG_ID_API_MAIN }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID_API_1 }}
        run: |
          cd apps/brands-api-1
          vercel pull --yes --environment=production --token $VERCEL_TOKEN
          vercel deploy --prod --token $VERCEL_TOKEN

      - name: Deploy Brands API 2
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          DATABASE_URL_API_2: ${{ secrets.DATABASE_URL_API_2 }}
          VERCEL_ORG_ID: ${{ secrets.ORG_ID_API_MAIN }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID_API_2 }}
        run: |
          cd apps/brands-api-2
          vercel pull --yes --environment=production --token $VERCEL_TOKEN
          vercel deploy --prod --token $VERCEL_TOKEN

      - name: Deploy Brands API 3
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_MAIN }}
          DATABASE_URL_API_3: ${{ secrets.DATABASE_URL_API_3 }}
          VERCEL_ORG_ID: ${{ secrets.ORG_ID_API_MAIN }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID_API_3 }}
        run: |
          cd apps/brands-api-3
          vercel pull --yes --environment=production --token $VERCEL_TOKEN
          vercel deploy --prod --token $VERCEL_TOKEN

      - name: Deploy Brands API 4
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_XYFORA }}
          DATABASE_URL_API_4: ${{ secrets.DATABASE_URL_API_4 }}
          VERCEL_ORG_ID: ${{ secrets.ORG_ID_API_XYFORA }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID_API_4 }}
        run: |
          cd apps/brands-api-4
          vercel pull --yes --environment=production --token $VERCEL_TOKEN
          vercel deploy --prod --token $VERCEL_TOKEN

      - name: Deploy Brands API 5
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_XYFORA }}
          DATABASE_URL_API_5: ${{ secrets.DATABASE_URL_API_5 }}
          VERCEL_ORG_ID: ${{ secrets.ORG_ID_API_XYFORA }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID_API_5 }}
        run: |
          cd apps/brands-api-5
          vercel pull --yes --environment=production --token $VERCEL_TOKEN
          vercel deploy --prod --token $VERCEL_TOKEN

      - name: Deploy Brands API 6
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_XYFORA }}
          DATABASE_URL_API_6: ${{ secrets.DATABASE_URL_API_6 }}
          VERCEL_ORG_ID: ${{ secrets.ORG_ID_API_XYFORA }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID_API_6 }}
        run: |
          cd apps/brands-api-6
          vercel pull --yes --environment=production --token $VERCEL_TOKEN
          vercel deploy --prod --token $VERCEL_TOKEN